<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dark Light Mode</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>

    <h2>Dark / Light Mode</h2>

    <label class="switch">

        <input type="checkbox" id="themeToggle">

        <span class="slider">

            <i class="fas fa-sun sun"></i>

            <i class="fas fa-moon moon"></i>

        </span>

    </label>

</header>

<section class="hero">

    <div class="card">

        <h1>Welcome 👋</h1>

        <p>
            This project demonstrates a professional Dark and Light
            theme switch using HTML, CSS and JavaScript.
            Your selected theme is automatically saved using
            Local Storage.
        </p>

        <button>Explore More</button>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
